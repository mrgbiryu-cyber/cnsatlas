<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>CNS Atlas PPT to Figma</title>
    <style>
      body {
        font-family: Inter, Arial, sans-serif;
        margin: 16px;
        color: #1f2937;
        background: #f7f7f8;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }

      p {
        font-size: 12px;
        line-height: 1.5;
        margin: 0 0 12px;
      }

      .panel {
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .label {
        font-size: 11px;
        color: #6b7280;
        margin-bottom: 6px;
      }

      .summary {
        font-size: 12px;
        color: #111827;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        min-height: 72px;
        white-space: pre-wrap;
      }

      textarea {
        width: 100%;
        height: 120px;
        resize: vertical;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        box-sizing: border-box;
      }

      button {
        background: #111827;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12px;
        cursor: pointer;
      }

      button.secondary {
        background: white;
        color: #111827;
        border: 1px solid #cbd5e1;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        font-size: 12px;
        margin-top: 8px;
      }

      .hint {
        color: #4b5563;
      }

      .danger {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>CNS Atlas PPT to Figma</h1>

    <div class="panel">
      <p class="hint">
        이 플러그인은 <code>PPTX</code>, <code>intermediate JSON</code>,
        <code>figma replay bundle JSON</code>을 받습니다.
      </p>
      <div class="row">
        <input
          id="fileInput"
          type="file"
          accept=".pptx,.json,application/json,application/vnd.openxmlformats-officedocument.presentationml.presentation"
        />
        <button class="secondary" id="clearButton" type="button">초기화</button>
      </div>
      <div class="status" id="status">PPTX 또는 JSON 파일을 선택하세요.</div>
    </div>

    <div class="panel">
      <div class="label">불러온 파일 요약</div>
      <div class="summary" id="summary">아직 파일이 없습니다.</div>
    </div>

    <div class="panel">
      <div class="label">직접 JSON 붙여넣기</div>
      <textarea id="jsonText" placeholder="필요하면 intermediate JSON을 여기에 붙여넣으세요."></textarea>
    </div>

    <div class="panel">
      <div class="label">렌더 모드</div>
      <div class="row">
        <label><input type="radio" name="renderMode" value="read-first" checked /> Read-First</label>
        <label><input type="radio" name="renderMode" value="vector-heavy" /> Vector-Heavy 실험</label>
      </div>
      <p class="hint">Vector-Heavy는 핵심 텍스트는 유지하고, 화살표/diamond/일부 시각 레이어를 벡터 위주로 렌더합니다.</p>
    </div>

    <div class="row">
      <button id="renderButton" disabled>Figma 렌더 시작</button>
      <button class="secondary" id="exportActualButton" type="button">Actual Manifest 내보내기</button>
    </div>

    <script src="vendor/jszip.min.js"></script>
    <script src="pptx-parser.js"></script>
    <script>
      const fileInput = document.getElementById("fileInput");
      const jsonText = document.getElementById("jsonText");
      const status = document.getElementById("status");
      const summary = document.getElementById("summary");
      const renderButton = document.getElementById("renderButton");
      const exportActualButton = document.getElementById("exportActualButton");
      const clearButton = document.getElementById("clearButton");
      const renderModeInputs = Array.from(document.querySelectorAll('input[name="renderMode"]'));

      let loadedJsonText = "";

      function isPptxFile(file) {
        const name = String(file && file.name || "").toLowerCase();
        return name.endsWith(".pptx") || file.type === "application/vnd.openxmlformats-officedocument.presentationml.presentation";
      }

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.className = isError ? "status danger" : "status";
      }

      function setSummary(text) {
        summary.textContent = text;
      }

      function getPayloadKind(payload) {
        if (payload && Array.isArray(payload.pages)) {
          return "intermediate";
        }
        if (payload && payload.kind === "figma-replay-bundle" && payload.document) {
          return "figma-replay-bundle";
        }
        throw new Error("지원하지 않는 JSON 형식입니다. intermediate JSON 또는 figma replay bundle JSON을 넣어야 합니다.");
      }

      function validatePayload(payload) {
        return {
          payload,
          kind: getPayloadKind(payload)
        };
      }

      function summarizePayload(payload, fileName, kind) {
        if (kind === "intermediate") {
          const slides = payload.pages.map((page) => `- Slide ${page.slide_no}: ${page.title_or_label || "untitled"} (${page.candidates.length} candidates)`);
          return [
            `파일: ${fileName || "직접 입력"}`,
            `형식: intermediate JSON`,
            `슬라이드 수: ${payload.pages.length}`,
            "",
            ...slides
          ].join("\n");
        }

        const assetCount = payload.assets ? Object.keys(payload.assets).length : 0;
        const missingAssets = Array.isArray(payload.missing_assets) ? payload.missing_assets.length : 0;
        return [
          `파일: ${fileName || "직접 입력"}`,
          `형식: figma replay bundle`,
          `페이지: ${payload.page_name || "unknown"}`,
          `노드 ID: ${payload.node_id || "unknown"}`,
          `에셋 수: ${assetCount}`,
          `누락 에셋 수: ${missingAssets}`
        ].join("\n");
      }

      function updateRenderAvailability() {
        renderButton.disabled = !loadedJsonText.trim() && !jsonText.value.trim();
      }

      function loadJsonText(text, fileName) {
        const trimmed = text.trim();
        if (!trimmed) {
          throw new Error("파일 내용이 비어 있습니다.");
        }
        if (trimmed.startsWith("PK")) {
          throw new Error("PPTX 바이너리 파일입니다. intermediate JSON 파일을 선택해야 합니다.");
        }

          const result = validatePayload(JSON.parse(trimmed));
          loadedJsonText = JSON.stringify(result.payload);
          setSummary(summarizePayload(result.payload, fileName, result.kind));
          setStatus(`${fileName || "직접 입력"} 검증 완료`);
          updateRenderAvailability();
      }

      async function loadPptxFile(file) {
        if (!window.CnsPptxParser || typeof window.CnsPptxParser.parsePptxArrayBuffer !== "function") {
          throw new Error("PPTX parser is not loaded.");
        }
        setStatus(`${file.name} 분석 중...`);
        const buffer = await file.arrayBuffer();
        const payload = await window.CnsPptxParser.parsePptxArrayBuffer(buffer, file.name);
        const result = validatePayload(payload);
        loadedJsonText = JSON.stringify(result.payload);
        jsonText.value = "";
        setSummary(summarizePayload(result.payload, file.name, result.kind));
        setStatus(`${file.name} PPTX 변환 준비 완료`);
        updateRenderAvailability();
      }

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        try {
          if (isPptxFile(file)) {
            await loadPptxFile(file);
            return;
          }
          const text = await file.text();
          jsonText.value = "";
          loadJsonText(text, file.name);
        } catch (error) {
          loadedJsonText = "";
          updateRenderAvailability();
          setSummary("아직 파일이 없습니다.");
          setStatus(error instanceof Error ? error.message : String(error), true);
        }
      });

      jsonText.addEventListener("input", () => {
        updateRenderAvailability();
      });

      clearButton.addEventListener("click", () => {
        fileInput.value = "";
        jsonText.value = "";
        loadedJsonText = "";
        setSummary("아직 파일이 없습니다.");
        setStatus("초기화되었습니다.");
        updateRenderAvailability();
      });

      renderButton.addEventListener("click", () => {
        const sourceText = loadedJsonText.trim() ? loadedJsonText : jsonText.value.trim();
        if (!sourceText) {
          setStatus("JSON이 없습니다.", true);
          return;
        }

        try {
          const result = validatePayload(JSON.parse(sourceText));
          const payload = result.payload;
          const selectedMode = renderModeInputs.find((input) => input.checked)?.value || "read-first";
          const renderTarget = result.kind === "intermediate"
            ? `${payload.pages.length} slides`
            : `${payload.page_name || "1 page"} replay`;
          setStatus(`렌더링 중... (${renderTarget})`);
          parent.postMessage(
            {
              pluginMessage: {
                type: "render-intermediate-json",
                jsonText: JSON.stringify(payload),
                renderMode: selectedMode
              }
            },
            "*"
          );
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), true);
        }
      });

      exportActualButton.addEventListener("click", () => {
        setStatus("Actual manifest 추출 중...");
        parent.postMessage(
          {
            pluginMessage: {
              type: "export-actual-manifest"
            }
          },
          "*"
        );
      });

      function downloadTextFile(filename, text) {
        const blob = new Blob([text], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(url);
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }
        if (message.type === "render-success") {
          setStatus(message.message);
        }
        if (message.type === "render-error") {
          setStatus(`Error: ${message.message}`, true);
        }
        if (message.type === "actual-manifest-exported") {
          downloadTextFile(message.filename, message.jsonText);
          setStatus(`${message.filename} 다운로드 완료`);
        }
      };
    </script>
  </body>
</html>
