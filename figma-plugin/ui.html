<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CNS Atlas PPT Visual Test</title>
    <style>
      body {
        font-family: Inter, Arial, sans-serif;
        margin: 16px;
        color: #1f2937;
        background: #f7f7f8;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }

      p {
        font-size: 12px;
        line-height: 1.5;
        margin: 0 0 12px;
      }

      .panel {
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }

      textarea {
        width: 100%;
        height: 160px;
        resize: vertical;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        box-sizing: border-box;
      }

      button {
        background: #111827;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        font-size: 12px;
        margin-top: 8px;
      }

      .hint {
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <h1>CNS Atlas PPT Visual Test</h1>

    <div class="panel">
      <p class="hint">
        Upload the intermediate JSON file generated from
        <code>docs/ppt-intermediate-candidates-12-19-29.json</code>, or paste its contents below.
      </p>
      <input id="fileInput" type="file" accept=".json" />
    </div>

    <div class="panel">
      <textarea id="jsonText" placeholder="Paste intermediate JSON here"></textarea>
      <div class="status" id="status">Ready.</div>
    </div>

    <button id="renderButton">Render In Figma</button>

    <script>
      const fileInput = document.getElementById("fileInput");
      const jsonText = document.getElementById("jsonText");
      const status = document.getElementById("status");
      const renderButton = document.getElementById("renderButton");

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }
        const text = await file.text();
        jsonText.value = text;
        status.textContent = `Loaded ${file.name}`;
      });

      renderButton.addEventListener("click", () => {
        if (!jsonText.value.trim()) {
          status.textContent = "JSON is empty.";
          return;
        }

        status.textContent = "Rendering...";
        parent.postMessage(
          {
            pluginMessage: {
              type: "render-intermediate-json",
              jsonText: jsonText.value
            }
          },
          "*"
        );
      });

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }
        if (message.type === "render-success") {
          status.textContent = message.message;
        }
        if (message.type === "render-error") {
          status.textContent = `Error: ${message.message}`;
        }
      };
    </script>
  </body>
  </html>
